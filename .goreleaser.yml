version: 2

builds:
  - id: spendgate
    main: ./cmd/spendgate
    binary: spendgate
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: spendgate
    formats: [tar.gz]

dockers:
  - id: spendgate-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/sh-rest/spendgate:{{ .Version }}-amd64"
    dockerfile: Dockerfile
  - id: spendgate-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/sh-rest/spendgate:{{ .Version }}-arm64"
    dockerfile: Dockerfile

docker_manifests:
  - name_template: "ghcr.io/sh-rest/spendgate:{{ .Version }}"
    image_templates:
      - "ghcr.io/sh-rest/spendgate:{{ .Version }}-amd64"
      - "ghcr.io/sh-rest/spendgate:{{ .Version }}-arm64"
  - name_template: "ghcr.io/sh-rest/spendgate:latest"
    image_templates:
      - "ghcr.io/sh-rest/spendgate:{{ .Version }}-amd64"
      - "ghcr.io/sh-rest/spendgate:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true
